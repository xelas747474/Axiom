  if(!data||data.length<2)return React.createElement("div",{className:"skel",style:{width,height}});

}

function Chart({data}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current;if(!c||!data?.length)return;
    const ctx=c.getContext("2d"),dpr=window.devicePixelRatio||1,rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;ctx.scale(dpr,dpr);
    const w=rect.width,h=rect.height,mn=Math.min(...data)*.998,mx=Math.max(...data)*1.002,rg=mx-mn||1;
    let start=null,anim;
    function draw(p){
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle="rgba(255,255,255,.03)";ctx.lineWidth=1;
      for(let i=0;i<5;i++){const y=(i/4)*h;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
      ctx.fillStyle="rgba(255,255,255,.2)";ctx.font="11px 'JetBrains Mono',monospace";ctx.textAlign="right";
      for(let i=0;i<5;i++){ctx.fillText("$"+Math.round(mx-(i/4)*rg).toLocaleString(),w-8,(i/4)*h+14)}
      const n=Math.floor(data.length*p);if(n<2)return;const vis=data.slice(0,n);
      const gr=ctx.createLinearGradient(0,0,0,h);gr.addColorStop(0,"rgba(59,130,246,.18)");gr.addColorStop(.6,"rgba(59,130,246,.03)");gr.addColorStop(1,"rgba(59,130,246,0)");
      ctx.beginPath();ctx.moveTo(0,h);
      vis.forEach((v,i)=>ctx.lineTo((i/(data.length-1))*w,h-((v-mn)/rg)*h));
      ctx.lineTo(((n-1)/(data.length-1))*w,h);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
      ctx.save();ctx.beginPath();
      vis.forEach((v,i)=>{const x=(i/(data.length-1))*w,y=h-((v-mn)/rg)*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
      ctx.strokeStyle="rgba(59,130,246,.25)";ctx.lineWidth=8;ctx.filter="blur(6px)";ctx.stroke();ctx.restore();
      ctx.beginPath();
      vis.forEach((v,i)=>{const x=(i/(data.length-1))*w,y=h-((v-mn)/rg)*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
      ctx.strokeStyle="#3b82f6";ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.lineCap="round";ctx.stroke();
      const lx=((n-1)/(data.length-1))*w,ly=h-((vis[vis.length-1]-mn)/rg)*h;
      ctx.beginPath();ctx.arc(lx,ly,6,0,Math.PI*2);ctx.fillStyle="rgba(59,130,246,.2)";ctx.fill();
      ctx.beginPath();ctx.arc(lx,ly,3.5,0,Math.PI*2);ctx.fillStyle="#3b82f6";ctx.fill();
    }

    return()=>cancelAnimationFrame(anim);
  },[data]);
  return React.createElement("canvas",{ref,style:{width:"100%",height:"100%",display:"block"}});
}
